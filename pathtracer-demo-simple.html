<!DOCTYPE html>
<html lang="en">
<head>
	<title>Three.js Path Tracer Demo - Simple Test</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background-color: #1a1a1a;
			overflow: hidden;
		}

		#info {
			position: absolute;
			top: 10px;
			left: 10px;
			color: #fff;
			background: rgba(0, 0, 0, 0.7);
			padding: 10px 15px;
			border-radius: 5px;
			font-size: 14px;
			z-index: 100;
		}

		#info a {
			color: #4a9eff;
			text-decoration: none;
		}

		#console {
			position: absolute;
			bottom: 10px;
			left: 10px;
			right: 10px;
			background: rgba(0, 0, 0, 0.8);
			color: #0f0;
			padding: 10px;
			font-family: 'Courier New', monospace;
			font-size: 12px;
			max-height: 200px;
			overflow-y: auto;
			z-index: 200;
			display: none;
		}

		#console.show {
			display: block;
		}

		canvas {
			display: block;
		}
	</style>
</head>

<body>
	<div id="info">
		Three.js Path Tracer Test<br/>
		Check browser console (F12) for errors
	</div>

	<div id="console"></div>

	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
				"three-gpu-pathtracer": "https://cdn.jsdelivr.net/npm/three-gpu-pathtracer@0.0.22/build/index.module.js",
				"three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.4/build/index.module.js"
			}
		}
	</script>

	<script type="module">
		const consoleDiv = document.getElementById('console');
		const log = (msg) => {
			console.log(msg);
			const p = document.createElement('div');
			p.textContent = msg;
			consoleDiv.appendChild(p);
			consoleDiv.scrollTop = consoleDiv.scrollHeight;
			consoleDiv.classList.add('show');
		};

		const error = (msg, err) => {
			console.error(msg, err);
			const p = document.createElement('div');
			p.style.color = '#f00';
			p.textContent = msg + ': ' + (err?.message || err);
			consoleDiv.appendChild(p);
			consoleDiv.scrollTop = consoleDiv.scrollHeight;
			consoleDiv.classList.add('show');
		};

		window.addEventListener('error', (e) => {
			error('Global error', e.error);
		});

		window.addEventListener('unhandledrejection', (e) => {
			error('Unhandled promise rejection', e.reason);
		});

		try {
			log('Loading Three.js...');
			const THREE = await import('three');
			log('Three.js loaded');

			log('Loading OrbitControls...');
			const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
			log('OrbitControls loaded');

			log('Loading three-gpu-pathtracer...');
			const { WebGLPathTracer, BlurredEnvMapGenerator, GradientEquirectTexture } = await import('three-gpu-pathtracer');
			log('three-gpu-pathtracer loaded');

			// Check WebGL support
			const canvas = document.createElement('canvas');
			const gl = canvas.getContext('webgl2');
			if (!gl) {
				throw new Error('WebGL 2.0 is not supported in this browser');
			}
			log('WebGL 2.0 supported');

			// Create scene
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
			camera.position.set(5, 5, 10);
			camera.lookAt(0, 0, 0);

			const renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			document.body.appendChild(renderer.domElement);
			log('Renderer created');

			// Create simple scene with multiple objects
			const group = new THREE.Group();
			
			// Sphere
			const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
			const sphereMaterial = new THREE.MeshStandardMaterial({ 
				color: 0xff6b6b,
				roughness: 0.3,
				metalness: 0.7
			});
			const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
			sphere.position.set(-2, 1, 0);
			group.add(sphere);

			// Box
			const boxGeometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
			const boxMaterial = new THREE.MeshStandardMaterial({ 
				color: 0x4ecdc4,
				roughness: 0.2,
				metalness: 0.8
			});
			const box = new THREE.Mesh(boxGeometry, boxMaterial);
			box.position.set(2, 0.75, 0);
			group.add(box);

			scene.add(group);

			const light = new THREE.DirectionalLight(0xffffff, 1);
			light.position.set(5, 10, 5);
			scene.add(light);

			const ambient = new THREE.AmbientLight(0xffffff, 0.5);
			scene.add(ambient);
			
			// Add environment
			const gradientMap = new GradientEquirectTexture();
			gradientMap.topColor.set(0xeeeeee);
			gradientMap.bottomColor.set(0xeaeaea);
			gradientMap.update();
			
			const envMapGenerator = new BlurredEnvMapGenerator(renderer);
			const blurredEnvMap = envMapGenerator.generate(gradientMap, 0);
			scene.environment = blurredEnvMap;

			// Create path tracer
			log('Creating WebGLPathTracer...');
			const pathTracer = new WebGLPathTracer(renderer);
			pathTracer.filterGlossyFactor = 1;
			pathTracer.minSamples = 3;
			log('WebGLPathTracer created');

			// Set scene
			log('Setting scene...');
			renderer.render(scene, camera); // Render once to initialize
			pathTracer.setScene(scene, camera);
			pathTracer.updateEnvironment();
			pathTracer.updateLights();
			pathTracer.updateMaterials();
			log('Scene set');

			// Controls
			const controls = new OrbitControls(camera, renderer.domElement);
			controls.target.set(0, 0, 0);
			controls.update();
			controls.addEventListener('change', () => {
				pathTracer.updateCamera();
			});

			// Animation loop
			let frameCount = 0;
			function animate() {
				requestAnimationFrame(animate);
				
				if (frameCount === 0) {
					log('Animation started');
				}
				frameCount++;

				pathTracer.enablePathTracing = true;
				pathTracer.renderSample();

				if (frameCount % 60 === 0) {
					log(`Samples: ${Math.floor(pathTracer.samples || 0)}`);
				}
			}

			animate();
			log('Demo initialized successfully!');

		} catch (err) {
			error('Failed to initialize', err);
		}
	</script>
</body>
</html>
