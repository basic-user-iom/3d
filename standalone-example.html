<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ground Projected Environment - Standalone</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			font-family: Arial, sans-serif;
			background: #000;
		}
		#info {
			position: absolute;
			top: 10px;
			left: 10px;
			color: white;
			background: rgba(0, 0, 0, 0.8);
			padding: 15px;
			border-radius: 8px;
			font-size: 14px;
			max-width: 300px;
			z-index: 1000;
		}
		#controls {
			position: absolute;
			top: 10px;
			right: 10px;
			background: rgba(0, 0, 0, 0.8);
			padding: 15px;
			border-radius: 8px;
			color: white;
			min-width: 200px;
			z-index: 1000;
		}
		button {
			padding: 10px 15px;
			margin: 5px 0;
			cursor: pointer;
			background: #4CAF50;
			color: white;
			border: none;
			border-radius: 5px;
			width: 100%;
			font-size: 14px;
			transition: background 0.3s;
		}
		button:hover {
			background: #45a049;
		}
		button:active {
			background: #3d8b40;
		}
		label {
			display: block;
			margin-top: 15px;
			font-size: 13px;
		}
		input[type="range"] {
			width: 100%;
			margin-top: 5px;
		}
		.value {
			color: #4CAF50;
			font-weight: bold;
		}
	</style>
</head>
<body>
	<div id="info">
		<strong>Ground Projected Environment Mapping</strong><br><br>
		🖱️ Drag to rotate<br>
		🔍 Scroll to zoom<br><br>
		This demo shows how to use HDR environment maps with ground projection for realistic reflections.
	</div>
	
	<div id="controls">
		<button id="toggleBtn">Disable Ground Projection</button>
		<label>
			Height: <span class="value" id="heightValue">15</span>
			<input type="range" id="heightSlider" min="5" max="30" value="15" step="0.5">
		</label>
		<label>
			Radius: <span class="value" id="radiusValue">100</span>
			<input type="range" id="radiusSlider" min="50" max="200" value="100" step="5">
		</label>
	</div>

	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
			}
		}
	</script>

	<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

		// ==========================================
		// GROUNDED SKYBOX CLASS
		// Inline implementation (normally imported from three/addons)
		// ==========================================
		
		class GroundedSkybox extends THREE.Mesh {
			constructor(map, height, radius, resolution = 128) {
				if (height <= 0 || radius <= 0 || resolution <= 0) {
					throw new Error('GroundedSkybox height, radius, and resolution must be positive.');
				}

				const geometry = new THREE.SphereGeometry(radius, 2 * resolution, resolution);
				geometry.scale(1, 1, -1);

				const pos = geometry.getAttribute('position');
				const tmp = new THREE.Vector3();

				for (let i = 0; i < pos.count; ++i) {
					tmp.fromBufferAttribute(pos, i);
					if (tmp.y < 0) {
						// Smooth out the transition from flat floor to sphere:
						const y1 = -height * 3 / 2;
						const f = tmp.y < y1 ? -height / tmp.y : (1 - tmp.y * tmp.y / (3 * y1 * y1));
						tmp.multiplyScalar(f);
						tmp.toArray(pos.array, 3 * i);
					}
				}

				pos.needsUpdate = true;

				super(geometry, new THREE.MeshBasicMaterial({ map, depthWrite: false }));
			}
		}

		// ==========================================
		// GROUND PROJECTION SETUP FUNCTION
		// Copy this function to your project
		// ==========================================
		
		async function setupGroundProjectedEnv(scene, options = {}) {
			let {
				hdrPath,
				height = 15,
				radius = 100,
				enabled = true
			} = options;

			// Load HDR environment map
			const loader = new RGBELoader();
			const envMap = await loader.loadAsync(hdrPath);
			envMap.mapping = THREE.EquirectangularReflectionMapping;

			// Create grounded skybox
			const skybox = new GroundedSkybox(envMap, height, radius);
			skybox.position.y = height - 0.01;

			// Set scene environment
			scene.environment = envMap;

			// Add or remove skybox based on enabled state
			if (enabled) {
				scene.add(skybox);
				scene.background = null;
			} else {
				scene.background = envMap;
			}

			// Toggle function
			const toggle = (enable) => {
				if (enable) {
					scene.add(skybox);
					scene.background = null;
				} else {
					scene.remove(skybox);
					scene.background = envMap;
				}
			};

			// Update function (for height changes only)
			const update = (newHeight) => {
				// Update height by recalculating geometry vertices
				const pos = skybox.geometry.getAttribute('position');
				const tmp = new THREE.Vector3();
				
				for (let i = 0; i < pos.count; ++i) {
					tmp.fromBufferAttribute(pos, i);
					const length = tmp.length();
					tmp.normalize().multiplyScalar(radius);
					
					if (tmp.y < 0) {
						const y1 = -newHeight * 3 / 2;
						const f = tmp.y < y1 ? -newHeight / tmp.y : (1 - tmp.y * tmp.y / (3 * y1 * y1));
						tmp.multiplyScalar(f);
					}
					
					tmp.toArray(pos.array, 3 * i);
				}
				
				pos.needsUpdate = true;
				skybox.position.y = newHeight - 0.01;
			};
			
			// Recreate function (for radius changes)
			const recreate = (newHeight, newRadius) => {
				const wasEnabled = scene.children.includes(skybox);
				scene.remove(skybox);
				skybox.geometry.dispose();
				
				const newSkybox = new GroundedSkybox(envMap, newHeight, newRadius);
				newSkybox.position.y = newHeight - 0.01;
				
				if (wasEnabled) {
					scene.add(newSkybox);
					scene.background = null;
				}
				
				// Replace skybox reference
				Object.assign(skybox, newSkybox);
				height = newHeight;
				radius = newRadius;
				
				return newSkybox;
			};

			return { skybox, envMap, toggle, update, recreate };
		}

		// ==========================================
		// SCENE SETUP
		// ==========================================

		// Camera
		const camera = new THREE.PerspectiveCamera(
			50,
			window.innerWidth / window.innerHeight,
			0.1,
			1000
		);
		camera.position.set(-15, 8, 15);

		// Scene
		const scene = new THREE.Scene();

		// Renderer
		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setPixelRatio(window.devicePixelRatio);
		renderer.setSize(window.innerWidth, window.innerHeight);
		renderer.toneMapping = THREE.ACESFilmicToneMapping;
		renderer.toneMappingExposure = 1.0;
		document.body.appendChild(renderer.domElement);

		// Controls
		const controls = new OrbitControls(camera, renderer.domElement);
		controls.target.set(0, 3, 0);
		controls.maxPolarAngle = Math.PI / 2;
		controls.minDistance = 8;
		controls.maxDistance = 50;
		controls.enablePan = false;
		controls.enableDamping = true;
		controls.dampingFactor = 0.05;
		controls.update();

		// ==========================================
		// LOAD ENVIRONMENT (Using free CDN HDR)
		// ==========================================

		const groundEnv = await setupGroundProjectedEnv(scene, {
			// Using a free HDR from CDN (Venice Sunset)
			hdrPath: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/equirectangular/venice_sunset_1k.hdr',
			height: 15,
			radius: 100,
			enabled: true
		});

		// ==========================================
		// ADD DEMO OBJECTS
		// ==========================================

		// Central torus knot (highly reflective)
		const torusKnotGeo = new THREE.TorusKnotGeometry(2, 0.6, 128, 32);
		const torusKnotMat = new THREE.MeshPhysicalMaterial({
			color: 0x111111,
			metalness: 1.0,
			roughness: 0.15,
			clearcoat: 1.0,
			clearcoatRoughness: 0.05,
			envMapIntensity: 1.5
		});
		const torusKnot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
		torusKnot.position.y = 4;
		scene.add(torusKnot);

		// Left sphere (colored metallic)
		const sphereGeo = new THREE.SphereGeometry(1.5, 64, 64);
		const sphereMat = new THREE.MeshPhysicalMaterial({
			color: 0x2196f3,
			metalness: 0.9,
			roughness: 0.1,
			clearcoat: 1.0,
			clearcoatRoughness: 0.1,
			envMapIntensity: 1.2
		});
		const sphere = new THREE.Mesh(sphereGeo, sphereMat);
		sphere.position.set(-6, 2.5, 0);
		scene.add(sphere);

		// Right cube (glass-like)
		const cubeGeo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
		const cubeMat = new THREE.MeshPhysicalMaterial({
			color: 0xffffff,
			metalness: 0.1,
			roughness: 0.05,
			transmission: 0.9,
			thickness: 1.5,
			envMapIntensity: 1.0
		});
		const cube = new THREE.Mesh(cubeGeo, cubeMat);
		cube.position.set(6, 2.5, 0);
		cube.rotation.y = Math.PI / 4;
		scene.add(cube);

		// Back torus (gold-like)
		const torusGeo = new THREE.TorusGeometry(2, 0.8, 32, 64);
		const torusMat = new THREE.MeshPhysicalMaterial({
			color: 0xffaa00,
			metalness: 1.0,
			roughness: 0.2,
			clearcoat: 1.0,
			clearcoatRoughness: 0.1,
			envMapIntensity: 1.3
		});
		const torus = new THREE.Mesh(torusGeo, torusMat);
		torus.position.set(0, 3, -6);
		torus.rotation.x = Math.PI / 3;
		scene.add(torus);

		// ==========================================
		// UI CONTROLS
		// ==========================================

		let isGrounded = true;
		const toggleBtn = document.getElementById('toggleBtn');
		const heightSlider = document.getElementById('heightSlider');
		const radiusSlider = document.getElementById('radiusSlider');
		const heightValue = document.getElementById('heightValue');
		const radiusValue = document.getElementById('radiusValue');

		toggleBtn.addEventListener('click', () => {
			isGrounded = !isGrounded;
			groundEnv.toggle(isGrounded);
			toggleBtn.textContent = isGrounded 
				? 'Disable Ground Projection' 
				: 'Enable Ground Projection';
			toggleBtn.style.background = isGrounded ? '#4CAF50' : '#f44336';
		});

		heightSlider.addEventListener('input', (e) => {
			const height = parseFloat(e.target.value);
			heightValue.textContent = height.toFixed(1);
			groundEnv.update(height);
		});

		radiusSlider.addEventListener('input', async (e) => {
			const radius = parseFloat(e.target.value);
			const height = parseFloat(heightSlider.value);
			radiusValue.textContent = radius;
			// Radius changes require recreating the skybox
			await groundEnv.recreate(height, radius);
		});

		// ==========================================
		// ANIMATION LOOP
		// ==========================================

		function animate() {
			requestAnimationFrame(animate);
			
			// Rotate objects
			torusKnot.rotation.y += 0.005;
			torusKnot.rotation.x += 0.003;
			sphere.rotation.y += 0.003;
			cube.rotation.y += 0.004;
			cube.rotation.x += 0.002;
			torus.rotation.z += 0.005;
			
			controls.update();
			renderer.render(scene, camera);
		}

		animate();

		// ==========================================
		// WINDOW RESIZE
		// ==========================================

		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});

	</script>
</body>
</html>
