name: Beta Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  viewer-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install viewer dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --run

      - name: Build viewer
        run: npm run build

      - name: Verify docs placement
        run: npm run docs:check

  desktop-validation:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            streets-gl-alt/package-lock.json

      - name: Install viewer dependencies
        run: npm ci

      - name: Install Streets GL dependencies
        run: npm --prefix streets-gl-alt ci

      - name: Build desktop distribution
        run: npm run desktop:dist
        # Optional: add WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD repo secrets to sign artifacts in CI.
