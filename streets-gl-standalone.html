    // Convert ways to line features
    function convertWaysToLines(overpassData) {
      const features = [];
      const nodes = {};
      const ways = {};
      
      if (overpassData.elements) {
        overpassData.elements.forEach(element => {
          if (element.type === 'node') {
            nodes[element.id] = [element.lon, element.lat];
          } else if (element.type === 'way' && element.tags) {
            ways[element.id] = element;
          }
        });
      }

      Object.values(ways).forEach(way => {
        if (!way.nodes || way.nodes.length < 2) return;
        
        const coordinates = way.nodes
          .map(nodeId => nodes[nodeId])
          .filter(coord => coord !== undefined);
        
        if (coordinates.length < 2) return;
        
        features.push({
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: coordinates
          },
          properties: way.tags || {}
        });
      });

      return features;
    }

    // Get road color and width
    function getRoadStyle(highwayType) {
      const styles = {
        'motorway': { color: 0x3a3a3a, width: 12, roughness: 0.7, metalness: 0.0 },
        'trunk': { color: 0x404040, width: 10, roughness: 0.75, metalness: 0.0 },
        'primary': { color: 0x4a4a4a, width: 8, roughness: 0.8, metalness: 0.0 },
        'secondary': { color: 0x505050, width: 6, roughness: 0.8, metalness: 0.0 },
        'tertiary': { color: 0x555555, width: 5, roughness: 0.85, metalness: 0.0 },
        'residential': { color: 0x5a5a5a, width: 4, roughness: 0.85, metalness: 0.0 },
        'service': { color: 0x606060, width: 3, roughness: 0.9, metalness: 0.0 },
        'footway': { color: 0x707070, width: 1.5, roughness: 0.9, metalness: 0.0 },
        'path': { color: 0x707070, width: 1.5, roughness: 0.9, metalness: 0.0 },
        'cycleway': { color: 0x656565, width: 2, roughness: 0.9, metalness: 0.0 },
        'default': { color: 0x555555, width: 4, roughness: 0.85, metalness: 0.0 }
      };
      return styles[highwayType] || styles.default;
    }
    
    // Create road texture for better visual quality
    function createRoadTexture(roadColor, width) {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      if (!ctx) return null;
      
      // Base asphalt color
      const color = new THREE.Color(roadColor);
      ctx.fillStyle = `rgb(${Math.floor(color.r * 255)}, ${Math.floor(color.g * 255)}, ${Math.floor(color.b * 255)})`;
      ctx.fillRect(0, 0, size, size);
      
      // Add road markings for wider roads
      if (width >= 6) {
        // Center line (dashed)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(size / 2, 0);
        ctx.lineTo(size / 2, size);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      // Add subtle texture/noise
      const imageData = ctx.getImageData(0, 0, size, size);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * 5;
        data[i] = Math.max(0, Math.min(255, data[i] + noise));
        data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + noise));
        data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + noise));
      }
      ctx.putImageData(imageData, 0, 0);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1, Math.max(1, width / 2));
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = true;
      texture.needsUpdate = true;
      
      return texture;
    }

    // Create roads
    async function createRoads(scene, centerLat, centerLon, zoom) {
      const features = await fetchRoads(centerLat, centerLon, zoom);
      const group = new THREE.Group();

      features.forEach(feature => {
        const props = feature.properties;
        const highwayType = props.highway || 'default';
        const style = getRoadStyle(highwayType);
        
        if (feature.geometry.type === 'LineString') {
          const coords = feature.geometry.coordinates;
          if (coords.length < 2) return;

          const points = coords.map(coord => {
            const point = latLonToMeters(coord[1], coord[0], centerLat, centerLon);
            return new THREE.Vector3(point.x, 0.05, point.z); // Slightly above ground for visibility
          });

          // Create road using BufferGeometry for better performance
          const vertices = [];
          const indices = [];
          const radius = style.width / 2;
          
          for (let i = 0; i < points.length - 1; i++) {
            const p1 = points[i];
            const p2 = points[i + 1];
            const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
            const perp = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(radius);
            
            const v1 = new THREE.Vector3().addVectors(p1, perp);
            const v2 = new THREE.Vector3().subVectors(p1, perp);
            const v3 = new THREE.Vector3().addVectors(p2, perp);
            const v4 = new THREE.Vector3().subVectors(p2, perp);
            
            const base = vertices.length / 3;
            vertices.push(v1.x, v1.y, v1.z);
            vertices.push(v2.x, v2.y, v2.z);
            vertices.push(v3.x, v3.y, v3.z);
            vertices.push(v4.x, v4.y, v4.z);
            
            indices.push(base, base + 1, base + 2);
            indices.push(base + 1, base + 3, base + 2);
          }
          
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
          geometry.setIndex(indices);
          geometry.computeVertexNormals(); // For better lighting
          
          // Create road texture for better visual quality
          const roadTexture = createRoadTexture(style.color, style.width);
          
          const material = new THREE.MeshStandardMaterial({
            color: style.color,
            map: roadTexture,
            roughness: style.roughness || 0.85,
            metalness: style.metalness || 0.0
          });

          const mesh = new THREE.Mesh(geometry, material);
          mesh.receiveShadow = true;
          mesh.frustumCulled = false; // Prevent disappearing when looking up
          group.add(mesh);
        }
      });

      scene.add(group);
      return { group, dispose: () => {
        group.traverse(child => {
          if (child instanceof THREE.Mesh) {
            child.geometry.dispose();
            child.material.dispose();
          }
        });
        scene.remove(group);
      }};
    }

    // Create water bodies
    async function createWater(scene, centerLat, centerLon, zoom) {
      const features = await fetchWater(centerLat, centerLon, zoom);
      const group = new THREE.Group();

      features.forEach(feature => {
        if (feature.geometry.type === 'Polygon') {
          const coords = feature.geometry.coordinates[0];
          if (coords.length < 3) return;

          const shape = new THREE.Shape();
          const first = latLonToMeters(coords[0][1], coords[0][0], centerLat, centerLon);
          shape.moveTo(first.x, first.z);

          for (let i = 1; i < coords.length; i++) {
            const point = latLonToMeters(coords[i][1], coords[i][0], centerLat, centerLon);
            shape.lineTo(point.x, point.z);
          }

          const geometry = new THREE.ShapeGeometry(shape);
          // Rotate to lay flat on ground
          geometry.rotateX(-Math.PI / 2);
          // Position slightly above ground
          geometry.translate(0, 0.05, 0);

          const material = new THREE.MeshStandardMaterial({
            color: 0x4a90e2,
            roughness: 0.1,
            metalness: 0.3,
            transparent: true,
            opacity: 0.8
          });

          const mesh = new THREE.Mesh(geometry, material);
          mesh.receiveShadow = true;
          mesh.frustumCulled = false; // Prevent disappearing when looking up
          group.add(mesh);
        }
      });

      scene.add(group);
      return { group, dispose: () => {
        group.traverse(child => {
          if (child instanceof THREE.Mesh) {
            child.geometry.dispose();
            child.material.dispose();
          }
        });
        scene.remove(group);
      }};
    }

    // Search using Nominatim
    async function searchLocation(query) {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`;
      const response = await fetch(url);
      const data = await response.json();
      return data.map(item => ({
        name: item.display_name,
        lat: parseFloat(item.lat),

      }));

    // Main application

          this.currentLat = this.hashData.lat;

          this.currentZoom = Math.max(10, Math.min(18, Math.round(this.hashData.zoom || 15)));
        } else {
          // If no hash, set default to match benchmark location
          // Benchmark: https://streets.gl/#32.89344,-97.03708,13.25,341.75,905.10
          this.hashData = {
            lat: 32.89344,
            lon: -97.03708,

          };
          // Update URL hash to match demo
          updateHash(this.hashData.lat, this.hashData.lon, this.hashData.zoom, this.hashData.heading, this.hashData.distance);
        }
        
        // Set current location from hashData
        this.currentLat = this.hashData.lat;

        // Setup sky/horizon (like streets.gl demo)
        this.setupSky();
        
        // Setup renderer

        if (!gl) {
          console.warn('[Renderer] WebGL2 not available, falling back to WebGL1. Some features may not work optimally.');
          // Show user-friendly warning
          const warningDiv = document.createElement('div');
          warningDiv.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,165,0,0.9);color:#000;padding:12px 24px;border-radius:8px;z-index:10000;font-weight:bold;';
          warningDiv.textContent = '⚠️ WebGL2 not supported. Please use a modern browser (Chrome, Firefox, Edge) for best experience.';
          document.body.appendChild(warningDiv);
          setTimeout(() => warningDiv.remove(), 10000);
        } else {
          console.log('[Renderer] WebGL2 support confirmed ✓');
        }
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        this.renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(this.renderer.domElement);

        // Setup camera
        // Camera with wider near/far range to prevent objects disappearing
        // Increased far plane and adjusted near plane for better visibility
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100000);
        this.updateCameraPosition();

        // Setup controls
        this.controls = new OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.minDistance = 10;
        this.controls.maxDistance = 10000;

        // Setup lights
        this.setupLights();

        // Load initial map
        await this.loadMap();

        // Setup UI
        this.setupUI();

        // Start render loop
        this.animate();

        // Handle window resize
        window.addEventListener('resize', () => this.onWindowResize());
      }

      setupLights() {

        this.ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        this.scene.add(this.ambientLight);

        // Sun light (directional) - intensity adjusted based on sun position
        this.sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        this.sunLight.castShadow = true;
        this.sunLight.shadow.mapSize.width = 2048;
        this.sunLight.shadow.mapSize.height = 2048;
        this.sunLight.shadow.camera.near = 0.5;
        this.sunLight.shadow.camera.far = 5000;
        this.sunLight.shadow.camera.left = -2000;
        this.sunLight.shadow.camera.right = 2000;
        this.sunLight.shadow.camera.top = 2000;
        this.sunLight.shadow.camera.bottom = -2000;
        this.scene.add(this.sunLight);

        // Add fog for atmospheric perspective (aerial perspective like official streets-gl)
        // Fog color matches sky color at horizon
        this.scene.fog = new THREE.FogExp2(0x87ceeb, 0.0002); // Sky blue, density
        // Fog will be adjusted in updateSunPosition based on sun elevation

        this.updateSunPosition();
      }

      // Setup sky/horizon rendering (like streets.gl demo)
      setupSky() {
        // Use Three.js Sky shader for realistic atmosphere
        const skyGeometry = new THREE.SphereGeometry(5000, 32, 32);
        
        // Three.js Sky shader (from three/examples/jsm/objects/Sky.js)
        const skyVertexShader = `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `;
        
        const skyFragmentShader = `
          uniform vec3 sunPosition;
          uniform float turbidity;
          uniform float rayleigh;
          uniform float mieCoefficient;
          uniform float mieDirectionalG;
          uniform float exposure;
          varying vec3 vWorldPosition;
          
          // Improved atmospheric scattering (matching streets-gl quality)
          vec3 skyColor(vec3 viewDir, vec3 sunDir) {
            float sunDotView = dot(sunDir, viewDir);
            float sunDotUp = dot(sunDir, vec3(0.0, 1.0, 0.0));
            float viewDotUp = dot(viewDir, vec3(0.0, 1.0, 0.0));
            
            // Rayleigh phase function (molecular scattering)
            float rayleighPhase = 0.75 * (1.0 + sunDotView * sunDotView);
            
            // Mie phase function (aerosol scattering)
            float g = mieDirectionalG;
            float miePhase = 1.5 * ((1.0 - g * g) / (2.0 + g * g)) * 
                             ((1.0 + sunDotView * sunDotView) / pow(1.0 + g * g - 2.0 * g * sunDotView, 1.5));
            
            // Wavelengths (RGB)
            vec3 lambda = vec3(0.680e-6, 0.550e-6, 0.450e-6);
            vec3 K = vec3(0.686, 0.678, 0.666);
            float v = 4.0;
            
            // Scattering coefficients
            vec3 rayleighCoeff = vec3(5.8e-6, 13.5e-6, 33.1e-6) * rayleigh;
            vec3 mieCoeff = K * mieCoefficient * pow(2.0 * 3.14159 / lambda, vec3(v - 2.0));
            
            // Zenith angles
            float sunAngle = clamp(sunDotUp, -1.0, 1.0);
            float viewAngle = clamp(viewDotUp, -1.0, 1.0);
            float sunZenithAngle = acos(clamp(sunAngle, -1.0, 1.0));
            float viewZenithAngle = acos(clamp(viewAngle, -1.0, 1.0));
            
            // Atmospheric depth factors (improved for better sunset/sunrise)
            float sunAngleFactor = 1.0 / (cos(sunZenithAngle) + 0.15 * pow(93.885 - sunZenithAngle * 180.0 / 3.14159, -1.253));
            float viewAngleFactor = 1.0 / (cos(viewZenithAngle) + 0.15 * pow(93.885 - viewZenithAngle * 180.0 / 3.14159, -1.253));
            
            // Optical depth
            float T = turbidity;
            vec3 betaR = rayleighCoeff;
            vec3 betaM = mieCoeff * T;
            vec3 opticalDepthR = betaR * (sunAngleFactor + viewAngleFactor);
            vec3 opticalDepthM = betaM * (sunAngleFactor + viewAngleFactor);
            
            // Transmittance (how much light passes through)
            vec3 transmittance = exp(-(opticalDepthR + opticalDepthM));
            
            // Inscattering (light scattered into view)
            vec3 inscatter = (betaR * rayleighPhase + betaM * miePhase) * sunAngleFactor * transmittance;
            
            // Sun disk (brighter when looking at sun)
            float sunDisk = smoothstep(0.992, 1.0, sunDotView);
            // Sun color changes with elevation (warmer at sunset/sunrise)
            float sunElevation = sunDotUp;
            vec3 sunColor = mix(vec3(1.0, 0.9, 0.8), vec3(1.0, 0.6, 0.3), max(0.0, -sunElevation));
            sunColor *= sunDisk * (1.0 + 2.0 * max(0.0, -sunElevation)); // Brighter at horizon
            
            vec3 color = inscatter + sunColor;
            
            // Tone mapping (exposure)
            color = vec3(1.0) - exp(-color * exposure);
            
            // Night sky (when sun is below horizon)
            if (sunDotUp < -0.1) {
              // Add subtle night sky color
              float nightFactor = clamp(-sunDotUp * 2.0, 0.0, 1.0);
              vec3 nightColor = vec3(0.05, 0.05, 0.1) * nightFactor;
              color = mix(color, nightColor, nightFactor * 0.5);
            }
            
            return color;
          }
          
          void main() {
            vec3 viewDir = normalize(vWorldPosition);
            vec3 sunDir = normalize(sunPosition);
            vec3 color = skyColor(viewDir, sunDir);
            
            // Horizon glow enhancement (better sunset/sunrise)
            float viewDotUp = dot(viewDir, vec3(0.0, 1.0, 0.0));
            float sunDotUp = dot(sunDir, vec3(0.0, 1.0, 0.0));
            
            if (viewDotUp < 0.2 && sunDotUp > -0.3) {
              // Near horizon - enhance glow
              float horizonFactor = 1.0 - (viewDotUp / 0.2);
              vec3 horizonGlow = vec3(1.0, 0.7, 0.5) * horizonFactor * 0.3;
              color += horizonGlow;
            }
            
            // Ensure minimum visibility
            color = max(color, vec3(0.02, 0.02, 0.03));
            
            gl_FragColor = vec4(color, 1.0);
          }
        `;
        
        const skyMaterial = new THREE.ShaderMaterial({
          vertexShader: skyVertexShader,
          fragmentShader: skyFragmentShader,
          uniforms: {
            sunPosition: { value: new THREE.Vector3(0, 1, 0) },
            turbidity: { value: 8.0 }, // Reduced for clearer sky (matches streets-gl better)
            rayleigh: { value: 2.0 },
            mieCoefficient: { value: 0.004 }, // Slightly reduced
            mieDirectionalG: { value: 0.76 }, // Standard value
            exposure: { value: 0.7 } // Slightly increased for better visibility
          },
          side: THREE.BackSide,
          depthWrite: false
        });
        
        const sky = new THREE.Mesh(skyGeometry, skyMaterial);
        sky.name = 'Sky';
        // Ensure sky renders first (before other objects) - negative renderOrder
        sky.renderOrder = -Infinity;
        this.scene.add(sky);
        
        // Store sky reference for updates
        this.sky = sky;
        this.skyMaterial = skyMaterial;
        
        // Remove solid background color (sky will render instead)
        this.scene.background = null;
        
        console.log('[Sky] Sky/horizon rendering initialized');
      }

      updateSunPosition() {
        // Use SunCalc for accurate astronomical sun position (like official streets-gl)
        // Calculate date/time from timeOfDay (0-24 hours) and currentDate
        const hours = Math.floor(this.timeOfDay);
        const minutes = Math.floor((this.timeOfDay % 1) * 60);
        const date = new Date(
          this.currentDate.getFullYear(),
          this.currentDate.getMonth(),
          this.currentDate.getDate(),
          hours,
          minutes,
          0
        );
        
        // Get sun position using SunCalc (matches official streets-gl MapTimeSystem)
        let sunPosition;
        if (typeof SunCalc !== 'undefined' && SunCalc.getPosition) {
          const sunPos = SunCalc.getPosition(date, this.currentLat, this.currentLon);
          // Convert azimuth/altitude to 3D direction vector
          // Azimuth: 0 = North, PI/2 = East, PI = South, 3*PI/2 = West
          // Altitude: 0 = horizon, PI/2 = zenith
          const azimuth = sunPos.azimuth + Math.PI; // Convert to direction (opposite of position)
          const altitude = sunPos.altitude;
          
          // Convert spherical to cartesian (matching streets-gl MapTimeSystem MathUtils.polarToCartesian)
          // Official formula: x = cos(altitude) * cos(azimuth), y = sin(altitude), z = cos(altitude) * sin(azimuth)
          // X = east-west, Y = up, Z = north-south
          // azimuth: 0 = North, PI/2 = East, PI = South, 3*PI/2 = West
          // altitude: 0 = horizon, PI/2 = zenith
          const sunDir = new THREE.Vector3(
            Math.cos(altitude) * Math.cos(azimuth),
            Math.sin(altitude),
            Math.cos(altitude) * Math.sin(azimuth)
          );
          sunDir.normalize();
          // Multiply by -1 to get direction TO sun (matching official streets-gl)
          sunPosition = sunDir.multiplyScalar(-1);
        } else {
          // Fallback to simple approximation if SunCalc not loaded
          const hour = this.timeOfDay;
          const sunAngle = (hour - 6) / 12 * Math.PI;
          const sunElevation = Math.max(0, Math.sin(sunAngle)) * Math.PI / 2;
          const sunAzimuth = hour < 12 ? Math.PI / 4 : -Math.PI / 4;
          sunPosition = new THREE.Vector3(
            Math.cos(sunAzimuth) * Math.cos(sunElevation),
            Math.sin(sunElevation),
            Math.sin(sunAzimuth) * Math.cos(sunElevation)
          ).normalize();
        }
        
        // Set sun light position (directional light points in opposite direction)
        const sunLightDir = sunPosition.clone().multiplyScalar(-1);
        this.sunLight.position.copy(sunLightDir.multiplyScalar(1000));
        
        // Calculate sun elevation for intensity and ambient light
        const sunElevation = Math.asin(Math.max(-1, Math.min(1, sunPosition.y)));
        const sunElevationDeg = THREE.MathUtils.radToDeg(sunElevation);
        
        // Intensity based on sun elevation (matches official streets-gl)
        // Sun below horizon = night (low intensity), sun above = day (high intensity)
        if (sunElevationDeg < 0) {
          // Night: use moon or ambient lighting
          this.sunLight.intensity = this.sunIntensity * 0.1;
          this.ambientLight.intensity = 0.1;
        } else {
          // Day: intensity based on elevation
          const elevationFactor = Math.max(0, Math.sin(sunElevation));
          this.sunLight.intensity = this.sunIntensity * (0.3 + 0.7 * elevationFactor);
          this.ambientLight.intensity = 0.2 + 0.1 * elevationFactor;
        }
        
        this.sunLight.target.position.set(0, 0, 0);
        this.sunLight.target.updateMatrixWorld();
        
        // Update sky sun position (normalized direction)
        if (this.skyMaterial) {
          this.skyMaterial.uniforms.sunPosition.value.copy(sunPosition);
          // Update sky exposure based on sun elevation
          const exposure = sunElevationDeg < 0 ? 0.3 : (0.5 + 0.3 * Math.max(0, Math.sin(sunElevation)));
          this.skyMaterial.uniforms.exposure.value = exposure;
        }
        
        // Update fog based on sun elevation (atmospheric perspective like official streets-gl)
        if (this.scene.fog && this.scene.fog instanceof THREE.FogExp2) {
          // More fog/haze when sun is low (sunrise/sunset)
          // Density increases when sun is near horizon
          const fogFactor = sunElevationDeg < 10 ? 0.8 : (0.2 + 0.1 * Math.max(0, Math.sin(sunElevation)));
          this.scene.fog.density = 0.00015 + (0.0001 * fogFactor);
          
          // Fog color changes with sun elevation (warmer at sunset/sunrise)
          if (sunElevationDeg < 5 && sunElevationDeg > -5) {
            // Sunset/sunrise: warmer fog color
            const warmFactor = 1.0 - Math.abs(sunElevationDeg) / 5.0;
            this.scene.fog.color = new THREE.Color(
              0.9 + 0.1 * warmFactor,
              0.7 + 0.2 * warmFactor,
              0.5 + 0.3 * warmFactor
            );
          } else if (sunElevationDeg < 0) {
            // Night: darker fog
            this.scene.fog.color = new THREE.Color(0.1, 0.1, 0.15);
          } else {
            // Day: sky blue fog
            this.scene.fog.color = new THREE.Color(0.53, 0.81, 0.92);
          }
        }
      }

      updateCameraPosition() {
        // Camera should look at origin (0, 0, 0) where ground is centered
        // Use distance from URL hash (5th parameter), or default camera distance
        const distance = this.hashData?.distance || this.cameraDistance || 905.10;
        const heading = this.hashData?.heading !== undefined ? this.hashData.heading : (this.defaultHeading || 25.00);
        
        // Calculate pitch from camera height - streets.gl uses a fixed pitch angle
        // For streets.gl, pitch is typically around 45-60 degrees looking down
        // We'll use a fixed pitch of 60 degrees (looking down at an angle)
        const pitch = 60; // Fixed pitch angle in degrees
        const pitchRad = THREE.MathUtils.degToRad(pitch);
        const headingRad = THREE.MathUtils.degToRad(heading);

        // Position camera above the ground looking down at an angle
        // X = east-west (longitude), Y = up, Z = north-south (latitude)
        this.camera.position.set(
          Math.cos(headingRad) * Math.cos(pitchRad) * distance,
          Math.sin(pitchRad) * distance,
          Math.sin(headingRad) * Math.cos(pitchRad) * distance
        );
        this.camera.lookAt(0, 0, 0); // Look at origin where ground is centered
        
        // Update camera FOV based on zoom if provided (3rd parameter)
        if (this.hashData?.zoom && this.hashData.zoom > 15) {
          // Higher zoom values might indicate camera FOV adjustment
          // streets.gl uses zoom for both tile level and camera FOV
          const fov = Math.max(30, Math.min(70, 50 - (this.hashData.zoom - 15) * 2));
          this.camera.fov = fov;
          this.camera.updateProjectionMatrix();
        }
        
        console.log('[Camera] Position updated:', {
          position: this.camera.position,
          target: { x: 0, y: 0, z: 0 },
          distance: distance,
          heading: heading,
          fov: this.camera.fov
        });
      }

      async loadMap() {
        // Debounce rapid calls
        if (this.loadMapDebounceTimer) {
          clearTimeout(this.loadMapDebounceTimer);
        }
        
        // Prevent concurrent loads
        if (this.isLoading) {
          console.log('[Map] Load already in progress, skipping...');
          return;
        }

        this.isLoading = true;
        const loadingEl = document.getElementById('loading');
        if (loadingEl) {
          loadingEl.style.display = 'flex';
        }
        
        // Add overall timeout to prevent page from hanging (120 seconds max)
        // Buildings can take a while to create, especially with textures
        let overallTimeout;
        const timeoutPromise = new Promise((_, reject) => {
          overallTimeout = setTimeout(() => {
            console.warn('[Map] Loading timeout reached - map will continue loading in background');
            reject(new Error('Map loading timeout - continuing in background'));
          }, 120000); // 2 minutes for large areas with many buildings
        });

        try {
          // Race the actual loading against the timeout
          await Promise.race([
            this.loadMapInternal(),
            timeoutPromise
          ]);
        } catch (error) {
          if (error.message && error.message.includes('timeout')) {
            // Timeout is expected for large areas - buildings continue loading in background
            console.log('[Map] Loading timeout reached - this is normal for areas with many buildings');
            console.log('[Map] Buildings will continue loading in the background');
          } else {
            console.error('Error loading map:', error);
            console.warn('[Map] Map loading encountered errors but will continue');
          }
        } finally {
          if (overallTimeout) clearTimeout(overallTimeout);
          this.isLoading = false;
          // Always hide loading indicator, even if some features failed
          const loadingEl = document.getElementById('loading');
          if (loadingEl) {
            loadingEl.style.display = 'none';
          }
          console.log('[Map] Loading complete. Some features may be missing due to API rate limits - this is normal.');
        }
      }
      
      // Internal loading function (separated for timeout handling)
      async loadMapInternal() {
        try {
          // Remove old features
          if (this.groundLayer) {
            this.groundLayer.dispose();
          }
          if (this.buildingsGroup) {
            this.buildingsGroup.dispose();
          }
          if (this.roadsGroup) {
            this.roadsGroup.dispose();
          }
          if (this.treesGroup) {
            this.treesGroup.dispose();
          }
          if (this.waterGroup) {
            this.waterGroup.dispose();
          }

          // Create ground layer (CRITICAL: Must be created first)
          console.log('[Map] Creating ground layer...');
          try {
            // Add timeout for ground layer creation (20 seconds max)
            const groundPromise = createGroundLayer(
              this.scene,
              this.currentLat,
              this.currentLon,
              this.currentZoom,
              this.currentLayerType
            );
            const groundTimeout = new Promise((_, reject) => 
              setTimeout(() => reject(new Error('Ground layer creation timeout')), 20000)
            );
            
            this.groundLayer = await Promise.race([groundPromise, groundTimeout]);
            console.log('[Map] Ground layer created successfully:', {
              hasGround: !!this.groundLayer.ground,
              groundVisible: this.groundLayer.ground.visible,
              groundPosition: this.groundLayer.ground.position,
              sceneChildren: this.scene.children.length
            });
          } catch (error) {
            console.error('[Map] Failed to create ground layer:', error);
            console.warn('[Map] Continuing without ground layer - map may not display correctly');
            // Don't throw - allow map to continue loading even if ground fails
            this.groundLayer = null;
          }

          // Skip water by default (often returns 0 features and causes rate limits)
          // Uncomment to enable water loading:
          // try {
          //   this.waterGroup = await createWater(
          //     this.scene,
          //     this.currentLat,
          //     this.currentLon,
          //     this.currentZoom
          //   );
          // } catch (error) {
          //   console.warn('[Map] Skipping water due to errors');
          //   this.waterGroup = null;
          // }
          this.waterGroup = null; // Disabled by default
          
          // Initial delay before loading features (2 seconds)
          await new Promise(resolve => setTimeout(resolve, 2000));

          // Create roads
          try {
            this.roadsGroup = await createRoads(
              this.scene,
              this.currentLat,
              this.currentLon,
              this.currentZoom
            );
          } catch (error) {
            console.warn('[Map] Skipping roads due to rate limits - this is normal');
            console.warn('[Map] The map will continue loading other features');
            this.roadsGroup = null;
          }
          
          // Delay to prevent rate limiting (4 seconds between major features)
          await new Promise(resolve => setTimeout(resolve, 4000));

          // Create buildings with timeout to prevent getting stuck
          if (this.buildingsEnabled) {
            try {
              // Start building creation (don't await - let it continue in background)
              const buildingsPromise = createBuildings(
                this.scene,
                this.currentLat,
                this.currentLon,
                this.currentZoom
              );
              
              // Wait for buildings with timeout, but continue even if timeout
              const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Buildings loading timeout')), 120000) // 120 second timeout
              );
              
              // Update building count as they're added (polling approach)
              const updateCount = setInterval(() => {
                // Check if buildings group exists in scene
                const buildingsInScene = this.scene.getObjectByName('BuildingsGroup');
                if (buildingsInScene) {
                  const count = buildingsInScene.children.length;
                  document.getElementById('info-buildings').textContent = count;
                  if (count > 0 && count % 5000 === 0) {
                    console.log(`[Buildings] ${count} buildings visible in scene`);
                  }
                }
              }, 3000); // Update every 3 seconds
              
              try {
                this.buildingsGroup = await Promise.race([buildingsPromise, timeoutPromise]);
                clearInterval(updateCount);
                
                if (this.buildingsGroup && this.buildingsGroup.group) {
                  const count = this.buildingsGroup.group.children.length;
                  document.getElementById('info-buildings').textContent = count;
                  console.log(`[Buildings] Completed: ${count} buildings added to scene`);
                } else {
                  document.getElementById('info-buildings').textContent = '0';
                }
              } catch (timeoutError) {
                clearInterval(updateCount);
                // Timeout occurred, but buildings are still being added to scene
                // Check scene directly for buildings
                const buildingsInScene = this.scene.getObjectByName('BuildingsGroup');
                if (buildingsInScene) {
                  const count = buildingsInScene.children.length;
                  document.getElementById('info-buildings').textContent = count;
                  console.log(`[Buildings] Timeout reached, but ${count} buildings are visible in scene`);
                  // Store reference even if promise didn't complete
                  if (!this.buildingsGroup) {
                    this.buildingsGroup = { group: buildingsInScene, dispose: () => this.scene.remove(buildingsInScene) };
                  }
                } else {
                  // Buildings promise might still resolve - don't set to null yet
                  console.warn('[Map] Buildings loading timed out - they may still be loading in background');
                  // Continue polling in case buildings finish later
                  setTimeout(() => {
                    const buildingsInScene = this.scene.getObjectByName('BuildingsGroup');
                    if (buildingsInScene) {
                      const count = buildingsInScene.children.length;
                      document.getElementById('info-buildings').textContent = count;
                      if (!this.buildingsGroup) {
                        this.buildingsGroup = { group: buildingsInScene, dispose: () => this.scene.remove(buildingsInScene) };
                      }
                    }
                  }, 10000);
                }
              }
            } catch (error) {
              console.warn('[Map] Buildings failed to load:', error.message || error);
              console.warn('[Map] Continuing without buildings - this is normal when APIs are rate-limited');
              this.buildingsGroup = null;
              document.getElementById('info-buildings').textContent = '0';
            }
            
            // Delay to prevent rate limiting (4 seconds)
            await new Promise(resolve => setTimeout(resolve, 4000));
          }

          // Create trees (on top) - optional, skip if rate limited
          try {
            this.treesGroup = await createTrees(
              this.scene,
              this.currentLat,
              this.currentLon,
              this.currentZoom
            );
          } catch (error) {
            console.warn('[Map] Skipping trees due to rate limits - this is normal');
            console.warn('[Map] The map will continue loading other features');
            this.treesGroup = null;
          }

          // Update camera
          this.updateCameraPosition();
          this.controls.target.set(0, 0, 0);
          this.controls.update();

          // Update hash
          const heading = Math.atan2(
            this.camera.position.z,
            this.camera.position.x
          );
          const distance = this.camera.position.length();
          updateHash(this.currentLat, this.currentLon, this.currentZoom, heading, distance);
        } catch (error) {
          console.error('[Map] Error in loadMapInternal:', error);
          // Don't re-throw - let outer handler deal with it
        }
      }

      // Debounced version for UI interactions
      loadMapDebounced() {
        if (this.loadMapDebounceTimer) {
          clearTimeout(this.loadMapDebounceTimer);
        }
        this.loadMapDebounceTimer = setTimeout(() => {
          this.loadMap();
        }, 500); // 500ms debounce
      }

      setupUI() {

        document.getElementById('search-button').addEventListener('click', async () => {
          const query = document.getElementById('search-input').value;
          if (!query) return;

          const results = await searchLocation(query);
          const resultsDiv = document.getElementById('search-results');
          resultsDiv.innerHTML = '';

          results.forEach(result => {
            const div = document.createElement('div');
            div.className = 'search-result';
            div.innerHTML = `
              <div class="search-result-name">${result.name.split(',')[0]}</div>
              <div class="search-result-details">${result.name}</div>
            `;
            div.addEventListener('click', () => {
              this.currentLat = result.lat;
              this.currentLon = result.lon;
              document.getElementById('lat-input').value = result.lat;
              document.getElementById('lon-input').value = result.lon;
              this.loadMapDebounced();
            });
            resultsDiv.appendChild(div);
          });
        });

        // Map style
        document.getElementById('map-style').addEventListener('change', (e) => {
          this.currentLayerType = e.target.value;
          this.loadMapDebounced();
        });

        // Date input (for seasonal sun position)
        const dateInput = document.getElementById('date-input');
        // Set default to today
        const today = new Date();
        dateInput.value = today.toISOString().split('T')[0];
        this.currentDate = today;
        dateInput.addEventListener('change', (e) => {
          this.currentDate = new Date(e.target.value);
          this.updateSunPosition();
        });

        // Time of day
        const timeSlider = document.getElementById('time-slider');
        timeSlider.addEventListener('input', (e) => {
          this.timeOfDay = parseFloat(e.target.value);
          document.getElementById('time-value').textContent = 
            `${Math.floor(this.timeOfDay)}:${Math.floor((this.timeOfDay % 1) * 60).toString().padStart(2, '0')}`;
          this.updateSunPosition();
        });

        // Sun intensity
        const sunSlider = document.getElementById('sun-intensity-slider');
        sunSlider.addEventListener('input', (e) => {
          this.sunIntensity = parseFloat(e.target.value);
          document.getElementById('sun-intensity-value').textContent = this.sunIntensity.toFixed(1);
          this.updateSunPosition();
        });

        // Buildings toggle
        document.getElementById('buildings-enabled').addEventListener('change', (e) => {
          this.buildingsEnabled = e.target.checked;
          this.loadMapDebounced();
        });

        // Shadows toggle
        document.getElementById('shadows-enabled').addEventListener('change', (e) => {
          this.shadowsEnabled = e.target.checked;
          this.renderer.shadowMap.enabled = this.shadowsEnabled;
          this.sunLight.castShadow = this.shadowsEnabled;
        });

        // Zoom
        const zoomSlider = document.getElementById('zoom-slider');
        zoomSlider.addEventListener('input', (e) => {
          this.currentZoom = parseInt(e.target.value);
          document.getElementById('zoom-value').textContent = this.currentZoom;
          document.getElementById('info-zoom').textContent = this.currentZoom;
        });

        // Location inputs
        document.getElementById('lat-input').value = this.currentLat;
        document.getElementById('lon-input').value = this.currentLon;
        document.getElementById('update-location').addEventListener('click', () => {
          this.currentLat = parseFloat(document.getElementById('lat-input').value);
          this.currentLon = parseFloat(document.getElementById('lon-input').value);
          this.currentZoom = parseInt(document.getElementById('zoom-slider').value);
          // Update sun position when location changes (sun position depends on lat/lon)
          this.updateSunPosition();
          this.loadMapDebounced();
        });

        // Update info panel
        setInterval(() => {
          document.getElementById('info-lat').textContent = this.currentLat.toFixed(5);
          document.getElementById('info-lon').textContent = this.currentLon.toFixed(5);
        }, 1000);
      }

      onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      }

      animate() {
        requestAnimationFrame(() => this.animate());
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
        
        // Debug: Log scene contents periodically (every 5 seconds)
        if (Math.random() < 0.0001) { // ~1% chance per frame = ~every 5 seconds at 60fps
          const buildingsInScene = this.scene.getObjectByName('BuildingsGroup');
          const buildingCount = buildingsInScene ? buildingsInScene.children.length : 0;
          if (buildingCount > 0) {
            console.log(`[Render] Scene has ${buildingCount} buildings, camera at:`, this.camera.position);
          }
        }
      }
    }

    // Initialize app
    console.log('[App] Starting Streets GL Standalone...');
    try {
      const app = new StreetsGLApp();
      console.log('[App] Streets GL App initialized successfully');
    } catch (error) {
      console.error('[App] Failed to initialize:', error);
      throw error; // Re-throw to see error in console
    }
  </script>
</body>
</html>
