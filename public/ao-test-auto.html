<!DOCTYPE html>
<html>
<head>
    <title>AO Auto Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 4px;
        }
        .success { border-left: 4px solid #4caf50; }
        .error { border-left: 4px solid #f44336; }
        .warning { border-left: 4px solid #ff9800; }
        .info { border-left: 4px solid #2196f3; }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #3a8eef; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>AO Auto Test Runner</h1>
    <p>This page will automatically run AO tests and display results.</p>
    <button onclick="runTests()">Run Tests Now</button>
    <button onclick="enableAO()">Enable AO</button>
    <button onclick="disableShadowMaps()">Disable Shadow Maps (Test Mode)</button>
    <button onclick="enableShadowMaps()">Re-enable Shadow Maps</button>
    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
            console.log(message);
        }

        function enableAO() {
            const viewer = window.__viewer || window.parent.__viewer;
            if (!viewer) {
                log('❌ Viewer not found. Make sure you are on the main page.', 'error');
                return;
            }
            
            const pp = viewer.postProcessingSystem;
            if (!pp) {
                log('❌ Post-processing system not found', 'error');
                return;
            }
            
            pp.updateConfig({ enabled: true });
            pp.updateConfig({ ao: { ...pp.config.ao, enabled: true } });
            log('✅ Post-processing and AO enabled - check 3D view', 'success');
        }

        function disableShadowMaps() {
            window.__testAOWithoutShadows = true;
            log('✅ Shadow maps disabled (test mode) - check if AO works now', 'info');
        }

        function enableShadowMaps() {
            window.__testAOWithoutShadows = false;
            log('✅ Shadow maps re-enabled', 'info');
        }

        function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '';
            log('=== Starting AO Tests ===', 'info');
            
            const viewer = window.__viewer || window.parent.__viewer;
            if (!viewer) {
                log('❌ Viewer not found', 'error');
                return;
            }
            log('✅ Viewer found', 'success');
            
            const pp = viewer.postProcessingSystem;
            if (!pp) {
                log('❌ Post-processing system not found', 'error');
                return;
            }
            
            // Test 1: Status
            log('=== Test 1: Post-Processing Status ===', 'info');
            log(`Post-processing enabled: ${pp.config?.enabled}`, pp.config?.enabled ? 'success' : 'warning');
            log(`AO enabled: ${pp.config?.ao?.enabled}`, pp.config?.ao?.enabled ? 'success' : 'warning');
            log(`AO pass exists: ${!!pp.aoPass}`, pp.aoPass ? 'success' : 'error');
            
            // Test 2: Pass Order
            log('=== Test 2: Pass Order ===', 'info');
            if (pp.composer) {
                const passes = pp.composer.passes;
                const passNames = passes.map(p => p.constructor.name);
                log(`Pass order: ${passNames.join(', ')}`, 'info');
                
                const renderIndex = passNames.indexOf('RenderPass');
                const saoIndex = passNames.indexOf('SAOPass');
                
                if (renderIndex === -1) {
                    log('❌ RenderPass not found!', 'error');
                } else {
                    log(`✅ RenderPass found at index: ${renderIndex}`, 'success');
                }
                
                if (saoIndex === -1) {
                    log('⚠️ SAOPass not found (may not be enabled)', 'warning');
                } else {
                    log(`✅ SAOPass found at index: ${saoIndex}`, 'success');
                    if (saoIndex === renderIndex + 1) {
                        log('✅ Pass order is CORRECT', 'success');
                    } else {
                        log(`❌ Pass order is WRONG! Expected SAOPass at ${renderIndex + 1}, found at ${saoIndex}`, 'error');
                    }
                }
            } else {
                log('❌ Composer not found', 'error');
            }
            
            // Test 3: Shadow Maps
            log('=== Test 3: Shadow Maps ===', 'info');
            const renderer = viewer.renderer;
            if (renderer) {
                log(`Shadow maps enabled: ${renderer.shadowMap.enabled}`, renderer.shadowMap.enabled ? 'success' : 'warning');
                log(`Shadow map type: ${renderer.shadowMap.type}`, 'info');
            }
            
            // Test 4: Depth Texture
            log('=== Test 4: Depth Texture ===', 'info');
            if (pp.composer) {
                const composerAny = pp.composer;
                if (composerAny.readBuffer) {
                    log('✅ readBuffer exists', 'success');
                    const hasDepthTexture = !!composerAny.readBuffer.depthTexture;
                    log(`Depth texture exists: ${hasDepthTexture}`, hasDepthTexture ? 'success' : 'error');
                    if (!hasDepthTexture) {
                        log('⚠️ WARNING: readBuffer.depthTexture is missing - SAOPass may not work!', 'error');
                    }
                } else {
                    log('❌ readBuffer not found', 'error');
                }
            }
            
            // Test 5: Material Properties (sample)
            log('=== Test 5: Material Properties (Sample) ===', 'info');
            const scene = viewer.scene;
            if (scene) {
                let totalMaterials = 0;
                let materialsWithAlphaTest = 0;
                let materialsWithDepthTestFalse = 0;
                let opaqueMaterialsWithDepthWriteFalse = 0;
                
                scene.traverse((obj) => {
                    if (obj.material) {
                        const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
                        materials.forEach((mat) => {
                            totalMaterials++;
                            if (mat.alphaTest !== undefined && mat.alphaTest > 0) {
                                materialsWithAlphaTest++;
                            }
                            if (mat.depthTest === false) {
                                materialsWithDepthTestFalse++;
                            }
                            if (mat.depthWrite === false && !mat.transparent) {
                                opaqueMaterialsWithDepthWriteFalse++;
                            }
                        });
                    }
                });
                
                log(`Total materials: ${totalMaterials}`, 'info');
                log(`Materials with alphaTest: ${materialsWithAlphaTest}`, materialsWithAlphaTest > 0 ? 'warning' : 'success');
                log(`Materials with depthTest=false: ${materialsWithDepthTestFalse}`, materialsWithDepthTestFalse > 0 ? 'error' : 'success');
                log(`Opaque materials with depthWrite=false: ${opaqueMaterialsWithDepthWriteFalse}`, opaqueMaterialsWithDepthWriteFalse > 0 ? 'error' : 'success');
            }
            
            log('=== Tests Complete ===', 'info');
            log('Check the 3D view to see if AO is working or causing black screen', 'info');
        }

        // Auto-run tests after a delay
        setTimeout(() => {
            log('Auto-running tests in 2 seconds...', 'info');
            setTimeout(runTests, 2000);
        }, 1000);
    </script>
</body>
</html>
