<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineShader Demo - Standalone</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎞️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            line-height: 1.4;
        }
        
        #info h1 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #fff;
        }
        
        #info p {
            margin: 3px 0;
            color: #ccc;
        }
        
        #info strong {
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">
        <h1>🎞️ CineShader Demo</h1>
        <p>Turbulence Noise Effect</p>
        <p><strong>Camera Controls:</strong></p>
        <p>• Left drag: Orbit</p>
        <p>• Right drag: Pan</p>
        <p>• Scroll: Zoom</p>
        <p><strong>Screen Controls:</strong></p>
        <p>• G: Move (translate)</p>
        <p>• R: Rotate</p>
        <p>• S: Scale</p>
        <p>• Drag handles to transform</p>
        <p>• Move mouse over screen to interact</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        
        // Initialize when module loads
        (function init() {

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a); // Darker background for better contrast
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 5);
        camera.lookAt(0, 1.4, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Enhanced tone mapping
        renderer.toneMappingExposure = 1.2; // Slightly brighter
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Camera controls (orbit around scene)
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.enableZoom = true;
        orbitControls.enablePan = true;
        orbitControls.target.set(0, 1.4, 0);
        
        // Enhanced lighting for better visuals
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        // Add rim light for better depth perception
        const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
        rimLight.position.set(-5, 5, -5);
        scene.add(rimLight);
        
        // Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
        scene.add(gridHelper);
        
        // Screen dimensions
        const screenWidth = 3;
        const screenHeight = 1.8;
        const aspectRatio = screenWidth / screenHeight;
        const pixelResolution = 1920.0;
        
        // Shader uniforms
        const uniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(pixelResolution, pixelResolution / aspectRatio) },
            iMouse: { value: new THREE.Vector4(0, 0, 0, 0) }
        };
        
        // Simplex 3D Noise by Ian McEwan, Ashima Arts
        const noiseFunctions = `
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            
            float snoise(vec3 v){ 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                
                // First corner
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 =   v - i + dot(i, C.xxx) ;
                
                // Other corners
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                
                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - 1. + 3.0 * C.xxx;
                
                // Permutations
                i = mod(i, 289.0 ); 
                vec4 p = permute( permute( permute( 
                                     i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                                 + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                                 + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                
                // Gradients
                float n_ = 1.0/7.0; // N=7
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                
                //Normalise gradients
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                
                // Mix final noise value
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                                                  dot(p2,x2), dot(p3,x3) ) );
            }
            
            float fbm( vec3 p ) {
                float f = 0.0;
                f += 0.5000*snoise( p ); p = p*2.02;
                f += 0.2500*snoise( p ); p = p*2.03;
                f += 0.1250*snoise( p ); p = p*2.01;
                f += 0.0625*snoise( p );
                return f/0.9375;
            }
        `;
        
        // Shader material with vertex displacement for true 3D surface
        const vertexShader = `
            uniform vec2 iResolution;
            uniform float iTime;
            uniform vec4 iMouse;
            varying vec2 vUv;
            varying float vDisplacement;
            
            ${noiseFunctions}
            
            void main() {
                // Flip UV to fix inversion (vUv.y = 1.0 - uv.y)
                vUv = vec2(uv.x, 1.0 - uv.y);
                
                // Calculate displacement using the same noise function as fragment shader
                vec2 fragCoord = vUv * iResolution;
                vec2 uv_coord = fragCoord / iResolution.xy;
                float mouseRatio = smoothstep(100.0, 0.0, length(iMouse.xy - fragCoord.xy));
                float noise = 0.25 + fbm(vec3(uv_coord * 12.0 + (iMouse.xy - fragCoord.xy) * mouseRatio * 0.05, iTime * 0.18 + 0.5 * mouseRatio));
                noise *= 0.25 + snoise(vec3(uv_coord * 4.0 + 1.5, iTime * 0.15));
                
                vDisplacement = noise;
                
                // Displace vertex along normal vector (proper 3D displacement)
                // Flip displacement direction to fix inversion (displace outward, not inward)
                vec3 newPosition = position;
                float displacementAmount = noise * 0.4; // Scale displacement for visible 3D effect
                // Displace along the normal vector to create proper 3D surface deformation
                // Use negative normal to flip direction if needed, or adjust based on facing
                newPosition += normal * displacementAmount;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;
        
        const fragmentShader = `
            precision highp float;
            
            uniform vec2 iResolution;
            uniform float iTime;
            uniform vec4 iMouse;
            varying vec2 vUv;
            varying float vDisplacement;
            
            ${noiseFunctions}
            
            void mainImage( out vec4 fragColor, in vec2 fragCoord ) {
                // Original CineShader demo code with brightness and opacity adjustments
                vec2 uv = fragCoord / iResolution.xy;
                float mouseRatio = smoothstep(100.0, 0.0, length(iMouse.xy - fragCoord.xy));
                float noise = 0.25 + fbm(vec3(uv * 12.0 + (iMouse.xy - fragCoord.xy) * mouseRatio * 0.05, iTime * 0.18 + 0.5 * mouseRatio));
                noise *= 0.25 + snoise(vec3(uv * 4.0 + 1.5, iTime * 0.15));
                
                // Increase brightness and opacity - remap noise to higher range for more solid appearance
                float alpha = noise;
                alpha = smoothstep(0.0, 0.8, alpha); // Remap to increase overall brightness
                alpha = mix(0.6, 1.0, alpha); // Ensure minimum opacity of 0.6, max of 1.0
                
                fragColor = vec4(1.0, 1.0, 1.0, alpha);
            }
            
            void main() {
                vec2 fragCoord = vUv * iResolution;
                vec4 fragColor;
                mainImage(fragColor, fragCoord);
                gl_FragColor = fragColor;
            }
        `;
        
        const screenMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: true,
            depthTest: true,
            blending: THREE.NormalBlending
            // Note: lights: true removed - not needed for displacement-based 3D effect
            // and causes uniform errors when lighting uniforms aren't declared in shader
        });
        
        // Create subdivided plane for vertex displacement (more vertices = smoother 3D surface)
        const frameDepth = 0.15;
        const screenGroup = new THREE.Group();
        
        // Use subdivided plane geometry for smooth vertex displacement
        // Higher segment count = more vertices = smoother 3D surface
        const segments = 128; // High resolution for smooth displacement
        const screenGeometry = new THREE.PlaneGeometry(screenWidth, screenHeight, segments, segments);
        const screen = new THREE.Mesh(screenGeometry, screenMaterial);
        screen.position.set(0, 0, frameDepth / 2 + 0.02);
        // Rotate to face camera - PlaneGeometry faces +Z by default, camera is at +Z looking towards origin
        // So we need to rotate 180 degrees to face -Z (towards camera)
        screen.rotation.y = Math.PI; // Face camera (rotate to face -Z)
        screen.renderOrder = 1000;
        screen.castShadow = false;
        screen.receiveShadow = false;
        
        // Update uniforms on render
        const startTime = performance.now();
        const rendererSize = new THREE.Vector2();
        screen.onBeforeRender = (renderer) => {
            const now = performance.now();
            uniforms.iTime.value = (now - startTime) / 1000.0;
            renderer.getSize(rendererSize);
            // Use pixel resolution (not world-space) - this is critical for proper noise detail
            uniforms.iResolution.value.set(pixelResolution, pixelResolution / aspectRatio);
        };
        
        screenGroup.add(screen);
        
        // Frame (create before adding group to scene)
        const frameThickness = 0.12;
        // frameDepth already defined above
        const outerW = screenWidth + frameThickness * 2.0;
        const outerH = screenHeight + frameThickness * 2.0;
        
        const frameMaterial = new THREE.MeshStandardMaterial({
            color: 0x111319,
            metalness: 0.65,
            roughness: 0.35
        });
        
        // Frame borders
        const topBorder = new THREE.Mesh(
            new THREE.BoxGeometry(outerW, frameThickness, frameDepth),
            frameMaterial
        );
        topBorder.position.set(0, screenHeight / 2 + frameThickness / 2, 0);
        
        const bottomBorder = new THREE.Mesh(
            new THREE.BoxGeometry(outerW, frameThickness, frameDepth),
            frameMaterial
        );
        bottomBorder.position.set(0, -screenHeight / 2 - frameThickness / 2, 0);
        
        const leftBorder = new THREE.Mesh(
            new THREE.BoxGeometry(frameThickness, screenHeight, frameDepth),
            frameMaterial
        );
        leftBorder.position.set(-screenWidth / 2 - frameThickness / 2, 0, 0);
        
        const rightBorder = new THREE.Mesh(
            new THREE.BoxGeometry(frameThickness, screenHeight, frameDepth),
            frameMaterial
        );
        rightBorder.position.set(screenWidth / 2 + frameThickness / 2, 0, 0);
        
        // Add frame borders to screen group so they move together
        screenGroup.add(topBorder);
        screenGroup.add(bottomBorder);
        screenGroup.add(leftBorder);
        screenGroup.add(rightBorder);
        
        // Position screen group (frame and screen will move together)
        screenGroup.position.set(0, 1.4, 0);
        scene.add(screenGroup);
        
        // Transform controls for 3D manipulation (move, rotate, scale)
        const transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.attach(screenGroup);
        transformControls.setMode('translate'); // Start with translate mode
        transformControls.setSpace('world');
        scene.add(transformControls);
        
        // Keyboard controls to switch between translate, rotate, and scale
        let currentMode = 'translate';
        window.addEventListener('keydown', (event) => {
            switch(event.key.toLowerCase()) {
                case 'g': // G for grab/move
                    transformControls.setMode('translate');
                    currentMode = 'translate';
                    break;
                case 'r': // R for rotate
                    transformControls.setMode('rotate');
                    currentMode = 'rotate';
                    break;
                case 's': // S for scale
                    transformControls.setMode('scale');
                    currentMode = 'scale';
                    break;
            }
        });
        
        // Disable orbit controls when using transform controls
        transformControls.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });
        
        // Mouse tracking and dragging
        const mouse = new THREE.Vector2();
        const mouse3D = new THREE.Vector3();
        const raycaster = new THREE.Raycaster();
        let isDragging = false;
        let dragStart = new THREE.Vector3();
        let screenStartPos = new THREE.Vector3();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        
        function updateMouse(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(screen);
            
            if (intersects.length > 0 && !isDragging) {
                const point = intersects[0].point;
                const screenLocal = screen.worldToLocal(point);
                const uv = new THREE.Vector2(
                    (screenLocal.x / screenWidth) + 0.5,
                    (screenLocal.y / screenHeight) + 0.5
                );
                uniforms.iMouse.value.set(
                    uv.x * pixelResolution,
                    (1.0 - uv.y) * pixelResolution / aspectRatio,
                    1.0,
                    1.0
                );
            }
        }
        
        function startDrag(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(screen);
            
            if (intersects.length > 0) {
                isDragging = true;
                dragStart.copy(intersects[0].point);
                screenStartPos.copy(screenGroup.position);
                
                // Update mouse click state
                uniforms.iMouse.value.z = 1.0;
            }
        }
        
        function onDrag(event) {
            if (!isDragging) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // Calculate intersection with a plane at the screen's depth
            const planeNormal = new THREE.Vector3(0, 0, 1);
            const planeConstant = -screenGroup.position.z;
            const plane = new THREE.Plane(planeNormal, planeConstant);
            const intersection = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersection);
            
            if (intersection) {
                const delta = new THREE.Vector3().subVectors(intersection, dragStart);
                screenGroup.position.copy(screenStartPos).add(delta);
            }
        }
        
        function endDrag() {
            if (isDragging) {
                isDragging = false;
                uniforms.iMouse.value.z = 0.0;
            }
        }
        
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                onDrag(e);
            } else {
                updateMouse(e);
            }
        });
        
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) { // Left mouse button
                startDrag(e);
            }
        });
        
        window.addEventListener('mouseup', () => {
            endDrag();
        });
        
        // Also handle mouse leave to stop dragging
        window.addEventListener('mouseleave', () => {
            endDrag();
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Update orbit controls
            orbitControls.update();
            
            // iTime and iResolution are updated in onBeforeRender callbacks for each layer
            renderer.render(scene, camera);
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start animation
        animate();
        })();
    </script>
</body>
</html>
