<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splat Smoke Test</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      #viewer {
        width: 100%;
        height: 100%;
      }

      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 6px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">Loading room.ply...</div>

    <script type="module">
      import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d'

      const container = document.getElementById('viewer')
      const status = document.getElementById('status')
      const params = new URLSearchParams(window.location.search)
      const src = params.get('src')
      const requestId = params.get('requestId') || 'standalone'
      const embedded = params.get('embedded') === '1'
      const format = params.get('format') || 'splat-ply'

      if (embedded) {
        document.documentElement.style.background = 'transparent'
        document.body.style.background = 'transparent'
      }

      function report(statusText, extra = {}) {
        window.parent?.postMessage(
          {
            type: 'splat-overlay-status',
            requestId,
            status: statusText,
            ...extra
          },
          window.location.origin
        )
      }

      const viewer = new GaussianSplats3D.Viewer({
        rootElement: container,
        cameraUp: [0, 1, 0],
        initialCameraPosition: [26.51, 21.89, 21.33],
        initialCameraLookAt: [0.42, 2.32, -4.76],
        renderMode: GaussianSplats3D.RenderMode.Always,
        sceneRevealMode: GaussianSplats3D.SceneRevealMode.Instant,
        logLevel: GaussianSplats3D.LogLevel.None
      })

      window.viewer = viewer

      const sourceUrl = src || 'http://127.0.0.1:8090/room.ply'
      status.textContent = `Loading ${sourceUrl.split('/').pop() || 'splat'}...`

      const sceneFormat =
        format === 'ksplat'
          ? GaussianSplats3D.SceneFormat.KSplat
          : format === 'splat'
            ? GaussianSplats3D.SceneFormat.Splat
            : GaussianSplats3D.SceneFormat.Ply

      viewer
        .addSplatScene(sourceUrl, {
          format: sceneFormat,
          splatAlphaRemovalThreshold: 5,
          showLoadingUI: true
        })
        .then(() => {
          viewer.start()
          status.textContent = `Loaded ${sourceUrl.split('/').pop() || 'splat'}`
          if (embedded) {
            status.style.display = 'none'
          }
          report('loaded')
        })
        .catch((error) => {
          console.error(error)
          status.textContent = `Failed: ${error?.message ?? String(error)}`
          report('failed', { message: error?.message ?? String(error) })
        })
    </script>
  </body>
</html>
